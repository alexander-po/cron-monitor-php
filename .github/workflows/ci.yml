name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on rapid pushes — keeps free Actions minutes from
# burning on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # PHPStan + php-cs-fixer are deterministic on the host PHP version, so
  # there's no value in running them across the full 8.1/8.2/8.3 matrix.
  # The `test` job below covers cross-version regressions where the actual
  # behaviour can drift (it's how we caught the symfony/config 8.1 issue).
  lint:
    name: Lint (PHP 8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - run: composer validate --strict
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff
      # `--error-format=github` makes PHPStan emit `::error file=…,line=…`
      # commands that GitHub Actions promotes to inline PR annotations,
      # surfacing failures on the changed lines directly in the diff view.
      - run: vendor/bin/phpstan analyse --memory-limit=512M --error-format=github --no-progress

  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: vendor/bin/phpunit

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      # composer.lock is git-ignored for libraries (per Composer's library
      # guidance), so `composer audit --locked` would fail. Run an install
      # first to get a lock-equivalent for the audit pass.
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer audit
